name: Deploy to Azure VM

# This tells GitHub to run this workflow ONLY when you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        # We use a pre-built GitHub Action that knows how to securely SSH into servers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # This is the command the robot will type into your Azure VM
            cd ~/sketchboard
            bash deploy.sh
