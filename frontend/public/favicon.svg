<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2A5F" />
      <stop offset="100%" stop-color="#FF8A00" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Sleek Dark Background -->
  <rect width="512" height="512" rx="112" fill="#111111" />

  <!-- The Whiteboard Outline -->
  <rect x="106" y="126" width="300" height="220" rx="24" fill="#1A1A1A" stroke="url(#brandGrad)" stroke-width="28" filter="url(#shadow)" />

  <!-- The Easel Stand Legs -->
  <path d="M 160 346 L 120 440 M 352 346 L 392 440" stroke="url(#brandGrad)" stroke-width="28" stroke-linecap="round" />

  <!-- A dynamic, vibrant sketch curve on the board -->
  <path d="M 160 250 C 200 150, 280 300, 350 180" fill="none" stroke="url(#brandGrad)" stroke-width="28" stroke-linecap="round" />
  
  <!-- Two little colorful dots like drawing nodes -->
  <circle cx="160" cy="250" r="14" fill="#FF2A5F" />
  <circle cx="350" cy="180" r="14" fill="#FF8A00" />
</svg>
